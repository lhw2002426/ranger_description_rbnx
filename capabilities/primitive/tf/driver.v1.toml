# Driver contract for the `primitive/tf` namespace owned by
# ranger_description_rbnx.
#
# Mirrors `<robonix>/capabilities/primitive/{imu,lidar,chassis,...}/driver.v1.toml`
# verbatim — the framework auto-generates a `Driver(CMD_INIT)` gRPC
# Servicer from this contract definition, and `robonix_api.lifecycle`
# probes for the generated class at startup. WITHOUT this file:
#
#   - atlas's contract registry doesn't know `robonix/primitive/tf/driver`
#     exists, so it accepts the cap declaration as a free-form id but
#     the codegen tree never produces a `DriverServicer` for it.
#   - `robonix_api.lifecycle.build_lifecycle_servicer` then logs
#     "no robonix/primitive/tf/driver contract — skipping lifecycle
#     servicer", which means our `@on_init` handler is NEVER bound.
#   - The package transitions REGISTERED → ACTIVE without ever
#     spawning `ros2 launch static_tf.launch.xml`.
#   - Net effect on a running deploy: TF tree silently splits into
#     two unconnected components, rtabmap warns
#       "Could not find a connection between 'base_link' and
#        'camera_435i_color_optical_frame'"
#     and SLAM/nav are nonsensical.
#
# This file is automatically picked up by both:
#   - `rbnx codegen -p $PKG` (codegen.rs adds <pkg>/capabilities/ as a
#     --contracts root) — emits the protobuf + grpc Python stubs.
#   - `rbnx boot` / atlas (deploy.rs seeds atlas's --capabilities
#     argument with each cache'd package's capabilities/ subdir) — so
#     `rbnx contracts` lists this contract too.
#
# When `system.soma` (URDF + robot_state_publisher) lands in robonix
# v0.2 and replaces this package, soma will own `primitive/tf/*` and
# this contract definition will move to the global `<robonix>/capabilities/`
# tree. Until then it lives here.

[contract]
id      = "robonix/primitive/tf/driver"
version = "1"
kind    = "primitive"
# Standard lifecycle/Driver IDL (Init/Activate/Deactivate/Shutdown).
# Defined under <robonix>/capabilities/lib/lifecycle/srv/Driver.srv —
# resolved through the `-I <root>/capabilities/lib` include codegen
# always passes.
idl     = "lifecycle/srv/Driver.srv"

[mode]
type = "rpc"
