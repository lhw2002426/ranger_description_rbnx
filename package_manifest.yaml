# Static-TF "description" wrapper for the AgileX Ranger Mini.
#
# Stand-in for `system.soma` (URDF + robot_state_publisher), which is
# on the v0.2 robonix roadmap but not yet shipped. Until soma lands,
# the deploy needs SOMETHING to publish the static edges from
# `base_link` down to each sensor mount frame, otherwise rtabmap's
# RGBD path silently fails TF lookups and nav goals land in the wrong
# place.
#
# This package is the smallest possible robonix wrapper around a
# `ros2 launch`: build is a no-op, start `exec`s ros2 launch directly,
# no Python module, no atlas_bridge, no `*/driver` capability, no
# Driver(CMD_INIT) handshake.
#
# Why no capabilities? TF in ROS 2 is a global side-channel —
# every tf2-aware node joins /tf + /tf_static automatically — so
# atlas-routing it would be pure indirection. The deploy-manifest
# entry exists so rbnx boot owns the launch process's lifetime
# (SIGTERM teardown follows the same path as every other package),
# not because we need atlas-side service discovery for TF.
#
# An empty `capabilities:` list means rbnx boot registers the
# package on atlas with state ACTIVE the moment it spawns and
# skips the Driver(CMD_INIT) handshake entirely (see
# robonix_api/lifecycle.py:128-137 — "no <ns>/driver contract —
# skipping lifecycle servicer").
#
# When soma ships, drop this package from the deploy manifest and
# point system.soma.urdf_path at the proper URDF — this whole
# package becomes a no-op and can be removed from the cache.
manifestVersion: 1

package:
  name: com.robonix.ranger.ranger_description
  version: 0.1.0
  vendor: robonix
  description: Static TF stand-in for the Ranger Mini until system.soma ships.
  license: MulanPSL-2.0

build: bash scripts/build.sh
start: bash scripts/start.sh

# No `*/driver` (no Driver(CMD_INIT) handler in start.sh) and no other
# routed contracts (TF is global side-channel — see file header).
capabilities: []
