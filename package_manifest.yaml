# Static-TF "description" wrapper for the AgileX Ranger Mini.
#
# Stand-in for `system.soma` (URDF + robot_state_publisher), which is
# on the v0.2 robonix roadmap but not yet shipped. Until soma lands,
# the deploy needs SOMETHING to publish the static edges from
# `base_link` down to each sensor mount frame, otherwise rtabmap's
# RGBD path silently fails TF lookups and nav goals land in the wrong
# place.
#
# Runtime shape (intentionally minimal):
#   - scripts/build.sh runs `rbnx codegen` ONLY (so the start script
#     can talk to atlas via the generated atlas_pb2 stubs).
#   - scripts/start.sh execs scripts/atlas_register_and_launch.py,
#     which:
#       1. RegisterPrimitive(id=ranger_description, namespace=
#          robonix/primitive/tf) on atlas — unblocks rbnx boot's
#          wait_for_registration loop.
#       2. spawns `ros2 launch <pkg>/launch/static_tf.launch.xml`
#          as a child process group.
#       3. heartbeats every 30s so atlas doesn't evict us at the
#          90s default timeout.
#       4. forwards SIGTERM/SIGINT to the launch tree on shutdown.
#
# No Driver(CMD_INIT) handler, no `*/driver` capability, no
# atlas-routed topics. TF in ROS 2 is a global side-channel —
# every tf2-aware node joins /tf + /tf_static automatically — so
# atlas-routing it would only add indirection. With capabilities: []
# rbnx boot's spawn_and_init walks `wait_for_registration` → finds
# `driver_contract=None` → marks the package ACTIVE without trying
# to drive INIT/ACTIVATE (deploy.rs:1247-1253). That's the entire
# point of the design.
#
# When soma ships, drop this package from the deploy manifest and
# point system.soma.urdf_path at the proper URDF — this whole
# package becomes a no-op and can be removed from the cache.
manifestVersion: 1

package:
  name: com.robonix.ranger.ranger_description
  version: 0.1.0
  vendor: robonix
  description: Static TF stand-in for the Ranger Mini until system.soma ships.
  license: MulanPSL-2.0

build: bash scripts/build.sh
start: bash scripts/start.sh

# Empty on purpose — see file header. We register a provider on atlas
# (so rbnx boot proceeds) but declare no routed contracts.
capabilities: []

